name: Deploy to Cloud Run

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    env:
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/atelier/atelier:latest
      SERVICE_NAME: atelier-api
      RUNTIME_SA: atelier-runtime@${{ secrets.GCP_PROJECT }}.iam.gserviceaccount.com

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --service-account=$RUNTIME_SA \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE }} \
            --set-env-vars="\
              DATABASE_URL=${{ secrets.DATABASE_URL }},\
              SECRET_KEY=${{ secrets.SECRET_KEY }},\
              GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},\
              GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},\
              GOOGLE_REDIRECT_URI=PLACEHOLDER,\
              MOBILE_REDIRECT_URI=atelier://callback,\
              GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
              FRONTEND_URL=PLACEHOLDER,\
              EXTRA_ORIGINS=atelier://" \
            --quiet

      - name: Run migrations
        run: |
          gcloud run jobs deploy atelier-migrate \
            --image=$IMAGE \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --service-account=$RUNTIME_SA \
            --set-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE }} \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --command="uv" \
            --args="run,alembic,upgrade,head" \
            --quiet
          gcloud run jobs execute atelier-migrate \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --wait
